<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="%BASE_URL%favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A simple page with a centralized start button. Click in it and a selected media stream will be shown by picture-in-picture API"
    />
    <title>Picture in Picture</title>
    <script type="module" src="/src/main.js"></script>
  </head>
  <body>
    <main>
      <!-- VIDEO -->
      <video
        id="video"
        width="360"
        height="640"
        controls
        autoplay
        hidden
      ></video>
      <!-- BUTTON -->
      <div class="button-container">
        <button id="button">START</button>
      </div>
    </main>
  </body>
</html>
